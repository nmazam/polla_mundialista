<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | Mundial Pro Predictor</title>
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/dashboard.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <nav class="navbar">
        <div class="navbar__logo">MUNDIAL<span>PRO</span></div>
        <div class="navbar__user">Hola, <span id="user-name">Participante</span></div>
        <button class="btn navbar__logout" id="btn-logout">Salir</button>
    </nav>

    <main class="dashboard-container">
        <div class="dashboard-tabs">
            <button class="dashboard-tab dashboard-tab--active" id="tab-matches">Mis Pronósticos</button>
            <button class="dashboard-tab" id="tab-ranking">Tabla de Posiciones</button>
        </div>

        <section id="section-matches" class="dashboard-content">
            <h2 class="section-title">Próximos Partidos</h2>
            <div class="match-grid" id="match-container">
                <p>Cargando partidos...</p>
            </div>
        </section>

        <section id="section-ranking" class="dashboard-content dashboard-content--hidden">
            <h2 class="section-title">Ranking Global</h2>
            <table class="ranking-table">
                <thead>
                    <tr>
                        <th>Pos.</th>
                        <th>Usuario</th>
                        <th>Puntos</th>
                    </tr>
                </thead>
                <tbody id="ranking-body"></tbody>
            </table>
        </section>
    </main>

    <script src="js/predictions.js" type="module"></script>
</body>
</html>
